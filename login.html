<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Facebook Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f0f2f5;
    font-family: 'Segoe UI', sans-serif;
}

.main-section{
    height:100vh;
}

.left-text h1{
    font-size:70px;
    font-weight:700;
    line-height:1.1;
}

.left-text span{
    color:#1877f2;
}

.image-stack{
    position:relative;
    width:300px;
    margin:auto;
}

.image-stack img{
    width:100%;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.small-img{
    position:absolute;
    bottom:-30px;
    left:-40px;
    width:150px !important;
}

.circle-img{
    position:absolute;
    bottom:-40px;
    right:-40px;
    width:90px !important;
    border-radius:50% !important;
    border:4px solid white;
}

.login-box{
    padding:20px 40px;
}

.form-control{
    height:55px;
    border-radius:15px;
    border:1px solid #ddd;
}

.form-control:focus{
    box-shadow:none;
    border-color:#1877f2;
}

.btn-login{
    background:#1877f2;
    border:none;
    height:55px;
    border-radius:30px;
    font-weight:600;
    font-size:18px;
}

.btn-login:hover{
    background:#166fe5;
}

.btn-create{
    border-radius:30px;
    height:55px;
    border:2px solid #1877f2;
    color:#1877f2;
    font-weight:500;
}

.btn-create:hover{
    background:#1877f2;
    color:white;
}

.meta{
    margin-top:40px;
    color:#666;
}
</style>
</head>

<body>

<div class="container-fluid">
<div class="row main-section align-items-center">

<!-- Left Side -->
<div class="col-lg-6 d-flex justify-content-center">
    <div>
        <div class="left-text mb-4">
            <h1>
                Explore <br>
                the things <br>
                <span>you love.</span>
            </h1>
        </div>

        <div class="image-stack mt-4">
            <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e" alt="">
            <img src="https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d" class="small-img" alt="">
            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330" class="circle-img" alt="">
        </div>
    </div>
</div>

<!-- Right Side -->
<div class="col-lg-6 bg-white d-flex align-items-center">
    <div class="login-box w-100">

        <h4 class="mb-4">Log in to Facebook</h4>

        <form>
            <div class="mb-3">
                <input type="email" class="form-control" placeholder="Email address or mobile number">
            </div>

            <div class="mb-3">
                <input type="password" class="form-control" placeholder="Password">
            </div>

            <button class="btn btn-login w-100 mb-3">Log in</button>

            <div class="text-center mb-4">
                <a href="#" class="text-decoration-none text-dark">Forgotten password?</a>
            </div>

            <button type="button" class="btn btn-create w-100">
                Create new account
            </button>
        </form>

        <div class="text-center meta">
            Meta
        </div>

    </div>
</div>

</div>
</div>

</body>
</html>
