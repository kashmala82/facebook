<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Facebook Home</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
body{
    background:#f0f2f5;
    font-family:'Segoe UI', sans-serif;
}

/* NAVBAR */
.navbar{
    background:#1877f2;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}
.navbar-brand{
    font-size:28px;
    font-weight:bold;
}

/* SIDEBAR */
.sidebar-item{
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}
.sidebar-item:hover{
    background:#e4e6eb;
}

/* STORIES */
.story{
    height:180px;
    border-radius:15px;
    background-size:cover;
    background-position:center;
    position:relative;
    cursor:pointer;
    transition:0.3s;
}
.story:hover{
    transform:scale(1.05);
}
.story span{
    position:absolute;
    bottom:10px;
    left:10px;
    color:white;
    font-weight:600;
}

/* CARDS */
.fb-card{
    border:none;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* PROFILE PIC */
.profile-pic{
    width:40px;
    height:40px;
    border-radius:50%;
    margin-right:10px;
}

/* POST ACTIONS */
.action-btn{
    cursor:pointer;
    padding:8px;
    border-radius:8px;
    transition:0.3s;
}
.action-btn:hover{
    background:#e4e6eb;
}

/* RIGHT SIDEBAR */
.contact-item{
    padding:6px;
    border-radius:8px;
    cursor:pointer;
}
.contact-item:hover{
    background:#e4e6eb;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4">
    <a class="navbar-brand text-white">facebook</a>
    <input class="form-control w-25" type="search" placeholder="Search Facebook">
    <div class="ms-auto text-white">
        <i class="bi bi-house-door-fill fs-4 me-3"></i>
        <i class="bi bi-bell-fill fs-4 me-3"></i>
        <i class="bi bi-person-circle fs-4"></i>
    </div>
</nav>

<div class="container mt-4">
<div class="row">

<!-- LEFT SIDEBAR -->
<div class="col-md-3">
    <div class="sidebar-item"><i class="bi bi-person me-2"></i> Profile</div>
    <div class="sidebar-item"><i class="bi bi-people me-2"></i> Friends</div>
    <div class="sidebar-item"><i class="bi bi-collection me-2"></i> Groups</div>
    <div class="sidebar-item"><i class="bi bi-shop me-2"></i> Marketplace</div>
</div>

<!-- MAIN FEED -->
<div class="col-md-6">

    <!-- STORIES -->
    <div class="d-flex gap-3 mb-4">
        <div class="story" style="background-image:url('https://picsum.photos/200/300?1'); width:120px;">
            <span>Your Story</span>
        </div>
        <div class="story" style="background-image:url('https://picsum.photos/200/300?2'); width:120px;">
            <span>Sarah</span>
        </div>
        <div class="story" style="background-image:url('https://picsum.photos/200/300?3'); width:120px;">
            <span>Ahmed</span>
        </div>
        <div class="story" style="background-image:url('https://picsum.photos/200/300?4'); width:120px;">
            <span>Fatima</span>
        </div>
    </div>

    <!-- CREATE POST -->
    <div class="card fb-card p-3 mb-4">
        <div class="d-flex align-items-center mb-3">
            <img src="https://via.placeholder.com/40" class="profile-pic">
            <input class="form-control rounded-pill" placeholder="What's on your mind?">
        </div>
        <hr>
        <div class="d-flex justify-content-around">
            <div class="action-btn text-danger"><i class="bi bi-camera-video-fill"></i> Live</div>
            <div class="action-btn text-success"><i class="bi bi-image-fill"></i> Photo</div>
            <div class="action-btn text-warning"><i class="bi bi-emoji-smile-fill"></i> Feeling</div>
        </div>
    </div>

    <!-- POST -->
    <div class="card fb-card p-3 mb-4">
        <div class="d-flex align-items-center">
            <img src="https://via.placeholder.com/40" class="profile-pic">
            <div>
                <strong>Sarah Khan</strong>
                <div class="text-muted small">2 hrs ago</div>
            </div>
        </div>

        <p class="mt-3">
            Just completed my lab assignment with a beautiful UI design! 🚀
        </p>

        <img src="https://picsum.photos/600/300" class="img-fluid rounded mb-3">

        <hr>

        <div class="d-flex justify-content-around">
            <div class="action-btn"><i class="bi bi-hand-thumbs-up"></i> Like</div>
            <div class="action-btn"><i class="bi bi-chat"></i> Comment</div>
            <div class="action-btn"><i class="bi bi-share"></i> Share</div>
        </div>
    </div>

</div>

<!-- RIGHT SIDEBAR -->
<div class="col-md-3">
    <div class="card fb-card p-3 mb-4">
        <h6>Sponsored</h6>
        <img src="https://picsum.photos/300/200" class="img-fluid rounded mb-2">
        <p class="small">Advertisement content here.</p>
    </div>

    <div class="card fb-card p-3">
        <h6>Contacts</h6>
        <div class="contact-item">Friend 1</div>
        <div class="contact-item">Friend 2</div>
        <div class="contact-item">Friend 3</div>
    </div>
</div>

</div>
</div>

</body>
</html>
